# Cross-sensor config: SemanticPOSS (Pandora 40-beam).
# Reviewer 3 asks that cross-sensor projection, holes, and filling be explained.
# This file records the projection and class mapping used for the SemanticPOSS
# cross-sensor experiment so the result is reproducible.

sensor:
  name: hesai_pandora
  beams: 40
  horizontal_resolution: 1800
  fov_up_deg: 7.0
  fov_down_deg: -16.0

projection:
  height: 40
  width: 1800
  keep: nearest_return
  # Same no-interpolation policy as the primary pipeline. The 40-beam sensor
  # yields sparser rows than the 64-beam training sensor, so more empty cells are
  # expected; these are zero-filled and recorded by the validity mask, not
  # interpolated. This directly documents the "holes" behavior R3 asked about.
  input_stage_hole_filling: false
  invalid_fill_value: 0.0
  validity_mask: true

knn_postproc:
  enabled: true
  k: 5
  search_window: 5
  sigma: 1.0

channels: dual_stream_16

# Mapping SemanticPOSS labels -> UBPC-9 evaluation classes.
label_map:
  0:  -1   # unlabeled -> ignore
  4:  8    # 1-person  -> dynamic
  5:  8    # 2+person  -> dynamic
  6:  8    # rider     -> dynamic
  7:  8    # car       -> dynamic
  8:  8    # trunk     -> dynamic (moving vehicle)
  9:  0    # plants    -> background
  10: 6    # pole      -> column
  11: 7    # traffic-sign -> window
  12: 3    # building  -> side_facade
  13: 3    # cone/fence-> side_facade
  14: 1    # bike (parked) -> ground proxy
  15: 1    # ground    -> ground

splits:
  train: [0, 1, 3, 4, 5]
  val:   [2]
  test:  [2]

checkpoint: checkpoints/full_semanticposs_seed0.pth
official_eval_log: logs/semanticposs_seq02_eval.txt
