# Jetson deployment environment manifest (filled).
# Reviewer 2: TensorRT / CUDA / power-mode / clocks / ambient temp.

device:
  board: Jetson Orin NX 16GB
  jetpack: 5.1.2
  l4t: 35.4.1

software:
  cuda: 11.4
  cudnn: 8.6.0
  tensorrt: 8.5.2
  onnxruntime: 1.16.3
  precision: fp16

power_and_clocks:
  nvpmodel_mode: 0   # MAXN
  jetson_clocks: on
  cpu_clock_mhz: 2200
  gpu_clock_mhz: 1300
  emc_clock_mhz: 3200
  power_budget_w: 25

thermal:
  ambient_temp_c: 24.5
  cooling: active fan
  thermal_throttle_observed: no

run:
  model: dsconv
  onnx_path: models/ds_rangenet_v3.onnx
  input_hw: [64, 512]
  duration_min: 60
  sampling_hz: 1
  telemetry_csv: jetson_telemetry.csv
